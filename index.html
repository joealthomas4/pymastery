<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyMastery — Master Python, in any order</title>
<meta name="description" content="A self-paced Python curriculum: fundamentals to advanced, plus data science, analytics, design and web tracks. Every topic has graded problems with hints and worked solutions.">
<style>
/* ---------- Tokens ---------- */
:root{
  --bg:#0B0F17; --panel:#111726; --panel2:#161E30; --raise:#1B2438;
  --line:rgba(158,180,222,.12); --line2:rgba(158,180,222,.22);
  --text:#E9EDF6; --muted:#97A3B8; --faint:#6B7789;
  --blue:#7FA6F5; --blue-ink:#28406E; --gold:#E8B458; --gold-ink:#4A3617;
  --easy:#57C99B; --hard:#F0A35E; --super:#F0719B;
  --code-bg:#0D1220; --out-bg:#0F1526;
  --k:#C792EA; --s:#9CD98A; --c:#5C6B84; --n:#F2B26B; --b:#82B4FF; --d:#E8B458;
  --radius:14px; --shadow:0 10px 30px rgba(0,0,0,.35);
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --serif:ui-serif,Georgia,"Times New Roman",serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
}
[data-theme="light"]{
  --bg:#F4F3EE; --panel:#FFFFFF; --panel2:#F7F6F1; --raise:#EFEDE6;
  --line:rgba(30,40,60,.12); --line2:rgba(30,40,60,.22);
  --text:#1C2333; --muted:#5A6577; --faint:#8A94A6;
  --blue:#3B63C4; --blue-ink:#D9E3F8; --gold:#B07B1E; --gold-ink:#F3E3C0;
  --easy:#1F9E6E; --hard:#C06A1B; --super:#C23A6B;
  --code-bg:#20283B; --out-bg:#EBEFF7;
  --k:#C792EA; --s:#9CD98A; --c:#8794AC; --n:#F2B26B; --b:#8FBCFF; --d:#E8B458;
  --shadow:0 10px 30px rgba(30,40,70,.10);
}
/* ---------- Base ---------- */
*{box-sizing:border-box}
html{scroll-behavior:smooth}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:16px/1.65 var(--sans);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:var(--blue);color:#0B0F17}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- Layout ---------- */
#app{display:grid;grid-template-columns:308px 1fr;min-height:100vh}
#sidebar{position:sticky;top:0;height:100vh;display:flex;flex-direction:column;
  background:var(--panel);border-right:1px solid var(--line);z-index:40}
#main{min-width:0}
#content{max-width:880px;margin:0 auto;padding:36px 40px 90px}
@media (max-width:960px){
  #app{grid-template-columns:1fr}
  #sidebar{position:fixed;left:0;top:0;width:min(320px,86vw);
    transform:translateX(-102%);transition:transform .22s ease;box-shadow:var(--shadow)}
  #sidebar.open{transform:none}
  #content{padding:22px 18px 80px}
}
#backdrop{position:fixed;inset:0;background:rgba(5,8,14,.55);opacity:0;pointer-events:none;
  transition:opacity .2s;z-index:30}
#backdrop.show{opacity:1;pointer-events:auto}

/* ---------- Sidebar ---------- */
.brand{display:flex;align-items:baseline;gap:10px;padding:20px 20px 8px}
.brand .mark{font:700 22px var(--mono);color:var(--gold);letter-spacing:-1px}
.brand h1{margin:0;font:italic 600 21px/1 var(--serif);letter-spacing:.2px}
.brand small{color:var(--faint);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
.searchwrap{padding:10px 16px 6px}
#search{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--line);
  background:var(--panel2);color:var(--text);font-size:14px}
#search::placeholder{color:var(--faint)}
.progressbox{padding:10px 20px 4px}
.progressbox .row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.progressbox .row b{color:var(--gold);font-variant-numeric:tabular-nums}
.cursorbar{height:6px;border-radius:4px;background:var(--panel2);border:1px solid var(--line);overflow:hidden}
.cursorbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),#f5d38f);
  transition:width .35s ease;position:relative}
.cursorbar i::after{content:"";position:absolute;right:0;top:0;bottom:0;width:2px;background:#fff5;
  animation:blink 1.1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
nav#toc{flex:1;overflow-y:auto;padding:8px 10px 12px;scrollbar-width:thin}
.track{margin:10px 6px 2px}
.track>button.tk{width:100%;display:flex;align-items:baseline;gap:8px;padding:7px 10px;border-radius:9px;text-align:left}
.track>button.tk:hover{background:var(--panel2)}
.tk .roman{font:600 11px var(--mono);color:var(--gold);min-width:22px}
.tk .tname{font:italic 600 15.5px var(--serif)}
.tk .count{margin-left:auto;font:11px var(--mono);color:var(--faint)}
.tk .chev{color:var(--faint);font-size:11px;transition:transform .18s}
.track.closed .chev{transform:rotate(-90deg)}
.track.closed .topics{display:none}
.topics{list-style:none;margin:2px 0 4px;padding:0 0 0 8px;border-left:1px dashed var(--line2);margin-left:20px}
.topics a{display:flex;gap:8px;align-items:baseline;padding:5px 10px;border-radius:8px;
  color:var(--muted);font-size:13.5px;line-height:1.4}
.topics a:hover{background:var(--panel2);color:var(--text);text-decoration:none}
.topics a.active{background:var(--blue-ink);color:var(--text)}
.topics a .dot{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--faint);flex:none;position:relative;top:-1px}
.topics a.done .dot{background:var(--gold);border-color:var(--gold)}
.topics a .min{margin-left:auto;font:10.5px var(--mono);color:var(--faint)}
.topics li.hide,.track.hide{display:none}
.side-foot{border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap}
.side-foot button,.side-foot label{font-size:11.5px;color:var(--muted);border:1px solid var(--line);
  border-radius:8px;padding:5px 9px;cursor:pointer}
.side-foot button:hover,.side-foot label:hover{color:var(--text);border-color:var(--line2)}
#importfile{display:none}

/* ---------- Header ---------- */
header#bar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;
  padding:10px 20px;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
#menubtn{display:none;font-size:20px;padding:4px 8px;border:1px solid var(--line);border-radius:8px}
@media (max-width:960px){#menubtn{display:block}}
#crumb{font:12px var(--mono);color:var(--muted);letter-spacing:.05em;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
#crumb b{color:var(--gold);font-weight:600}
header#bar .sp{flex:1}
#themebtn{border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:13px;color:var(--muted)}
#themebtn:hover{color:var(--text)}
kbd{font:11px var(--mono);border:1px solid var(--line2);border-bottom-width:2px;border-radius:5px;
  padding:1px 5px;color:var(--muted)}

/* ---------- Content typography ---------- */
.eyebrow{font:600 11.5px var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin:0 0 10px}
h2.title{font:italic 600 clamp(30px,4.6vw,44px)/1.12 var(--serif);margin:0 0 8px;letter-spacing:.2px}
.meta{color:var(--faint);font-size:13px;display:flex;gap:14px;flex-wrap:wrap;margin-bottom:26px}
.meta .pill{border:1px solid var(--line);border-radius:99px;padding:2px 10px}
article.body h3{font:italic 600 24px/1.25 var(--serif);margin:38px 0 10px}
article.body h4{font:600 16.5px var(--sans);margin:26px 0 8px;color:var(--text)}
article.body p{margin:0 0 14px;color:var(--text)}
article.body ul,article.body ol{margin:0 0 16px;padding-left:22px}
article.body li{margin:5px 0}
article.body strong{color:var(--gold)}
code{font:13.2px var(--mono);background:var(--panel2);border:1px solid var(--line);
  border-radius:6px;padding:1.5px 6px;color:var(--blue);white-space:nowrap}
[data-theme="light"] code{color:#2A4FA8}
.callout{border:1px solid var(--line);border-left:3px solid var(--gold);background:var(--panel);
  border-radius:10px;padding:12px 16px;margin:0 0 16px;color:var(--muted)}
.callout p{margin:0;color:inherit}
.callout strong{color:var(--gold)}

/* ---------- Code blocks ---------- */
.codewrap{position:relative;margin:0 0 18px}
pre.code{margin:0;background:var(--code-bg);border:1px solid var(--line);border-radius:12px;
  padding:15px 16px;overflow-x:auto;font:13.5px/1.62 var(--mono);color:#DDE5F2}
pre.code code{all:unset;font:inherit}
pre.out{margin:-8px 0 18px;background:var(--out-bg);border:1px dashed var(--line2);border-top:none;
  border-radius:0 0 12px 12px;padding:11px 16px;overflow-x:auto;font:12.8px/1.6 var(--mono);color:var(--muted)}
pre.out::before{content:"output";display:block;font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--faint);margin-bottom:5px}
.codewrap.hasout pre.code{border-radius:12px 12px 0 0}
.copybtn{position:absolute;top:8px;right:8px;font:11px var(--mono);color:var(--muted);
  background:var(--raise);border:1px solid var(--line);border-radius:7px;padding:3px 9px;opacity:0;transition:opacity .15s}
.codewrap:hover .copybtn,.copybtn:focus-visible{opacity:1}
.copybtn:hover{color:var(--text)}
.tok-k{color:var(--k)} .tok-s{color:var(--s)} .tok-c{color:var(--c);font-style:italic}
.tok-n{color:var(--n)} .tok-b{color:var(--b)} .tok-d{color:var(--d)}

/* ---------- Question ladder (signature) ---------- */
.ladderhead{margin:46px 0 6px;display:flex;align-items:baseline;gap:12px}
.ladderhead h3{font:italic 600 26px var(--serif);margin:0}
.ladderhead span{font:12px var(--mono);color:var(--faint)}
.ladder{position:relative;margin:14px 0 0;padding-left:26px}
.ladder::before{content:"";position:absolute;left:8px;top:14px;bottom:14px;width:2px;
  background:linear-gradient(var(--easy),var(--hard),var(--super));border-radius:2px;opacity:.85}
.rung{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 20px 14px;margin:0 0 16px;box-shadow:var(--shadow)}
.rung::before{content:"";position:absolute;left:-23px;top:22px;width:12px;height:12px;border-radius:50%;
  background:var(--bg);border:3px solid var(--lvl)}
.rung.easy{--lvl:var(--easy)} .rung.hard{--lvl:var(--hard)} .rung.super{--lvl:var(--super)}
.rung .rhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.badge{font:700 10.5px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--lvl);
  border:1px solid var(--lvl);border-radius:99px;padding:2px 10px}
.rung h4{margin:0;font:600 17px var(--sans);flex:1}
.solvebtn{font:12px var(--mono);border:1px solid var(--line2);border-radius:8px;padding:4px 11px;color:var(--muted)}
.solvebtn:hover{color:var(--text)}
.rung.solved{border-color:color-mix(in srgb,var(--lvl) 45%,var(--line))}
.rung.solved .solvebtn{background:var(--lvl);border-color:var(--lvl);color:#0B0F17;font-weight:700}
details{border:1px solid var(--line);border-radius:10px;background:var(--panel2);margin:10px 0 0}
details summary{cursor:pointer;padding:9px 14px;font-size:13.5px;color:var(--muted);
  list-style:none;display:flex;gap:8px;align-items:center}
details summary::before{content:"▸";font-size:11px;color:var(--faint);transition:transform .15s}
details[open] summary::before{transform:rotate(90deg)}
details summary:hover{color:var(--text)}
details .inner{padding:2px 16px 14px}
details.sol summary{color:var(--gold)}
details p{margin:0 0 10px}

/* ---------- Home ---------- */
.hero{padding:26px 0 8px}
.hero .big{font:italic 600 clamp(34px,5.4vw,54px)/1.08 var(--serif);margin:6px 0 14px}
.hero .big em{font-style:normal;color:var(--gold)}
.hero p.lede{font-size:17.5px;color:var(--muted);max-width:62ch}
.statline{display:flex;gap:26px;flex-wrap:wrap;margin:22px 0 6px;color:var(--muted);font-size:13px}
.statline b{display:block;font:600 26px var(--serif);color:var(--text)}
.trackcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px 22px;margin:16px 0;box-shadow:var(--shadow)}
.trackcard .thead{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.trackcard .roman{font:700 13px var(--mono);color:var(--gold)}
.trackcard h3{margin:0;font:italic 600 23px var(--serif)}
.trackcard .tag{color:var(--faint);font-size:12.5px;margin-left:auto;font-family:var(--mono)}
.trackcard p.blurb{color:var(--muted);margin:8px 0 12px;font-size:14.5px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chips a{font-size:13px;border:1px solid var(--line);border-radius:99px;padding:5px 13px;color:var(--text);
  background:var(--panel2)}
.chips a:hover{border-color:var(--gold);text-decoration:none}
.chips a.done{border-color:var(--gold);color:var(--gold)}
.method{border:1px solid var(--line2);border-radius:var(--radius);padding:22px 24px;margin:30px 0;
  background:linear-gradient(180deg,var(--panel),var(--panel2))}
.method h3{font:italic 600 24px var(--serif);margin:0 0 6px}
.method ol{margin:10px 0 4px;padding-left:20px;color:var(--muted)}
.method li{margin:8px 0}
.method li b{color:var(--text)}

/* ---------- Footer nav ---------- */
.pager{display:flex;gap:12px;margin-top:52px;border-top:1px solid var(--line);padding-top:22px}
.pager a{flex:1;border:1px solid var(--line);border-radius:12px;padding:13px 16px;color:var(--muted)}
.pager a:hover{border-color:var(--line2);color:var(--text);text-decoration:none}
.pager a span{display:block;font:10.5px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
.pager a.next{text-align:right}
.topicdone{margin-top:34px;text-align:center}
.topicdone button{border:1px solid var(--gold);color:var(--gold);border-radius:10px;padding:9px 20px;font-size:14px}
.topicdone button.on{background:var(--gold);color:#0B0F17;font-weight:700}
.fadein{animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar" aria-label="Curriculum">
    <div class="brand"><span class="mark">&gt;&gt;&gt;</span>
      <div><h1>PyMastery</h1><small>any topic · any order</small></div></div>
    <div class="searchwrap"><input id="search" type="search" placeholder="Search topics…  ( / )" aria-label="Search topics"></div>
    <div class="progressbox">
      <div class="row"><span>Problems solved</span><b id="pcount">0 / 0</b></div>
      <div class="cursorbar"><i id="pbar"></i></div>
    </div>
    <nav id="toc"></nav>
    <div class="side-foot">
      <button id="exportbtn" title="Download your progress as a JSON file">Save progress ↓</button>
      <label for="importfile" title="Load a previously saved progress file">Load ↑</label>
      <input type="file" id="importfile" accept="application/json">
      <button id="resetbtn">Reset</button>
    </div>
  </aside>
  <div id="backdrop"></div>
  <div id="main">
    <header id="bar">
      <button id="menubtn" aria-label="Open curriculum">☰</button>
      <div id="crumb"></div><div class="sp"></div>
      <span style="font-size:11px;color:var(--faint)">search <kbd>/</kbd></span>
      <button id="themebtn" aria-label="Toggle theme">◐ theme</button>
    </header>
    <div id="content" role="main"></div>
  </div>
</div>

<script>
"use strict";
/* ================= State & data registry ================= */
const CURRICULUM = [];
function addTrack(t){ CURRICULUM.push(t); }
const state = { solved:new Set(), doneTopics:new Set() };
const $ = s=>document.querySelector(s);
const esc = s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

/* ================= Python syntax highlighter ================= */
const KW="def|class|return|yield|lambda|if|elif|else|for|while|break|continue|pass|import|from|as|with|try|except|finally|raise|assert|in|is|not|and|or|None|True|False|global|nonlocal|del|async|await|match|case";
const BI="self|cls|print|len|range|enumerate|zip|map|filter|sorted|reversed|sum|min|max|abs|round|type|isinstance|issubclass|getattr|setattr|hasattr|repr|str|int|float|bool|list|dict|set|tuple|frozenset|open|input|iter|next|super|vars|dir|id|hash|any|all|callable|format|Exception|ValueError|TypeError|KeyError|IndexError|ZeroDivisionError|FileNotFoundError|StopIteration|RuntimeError";
const TOKRE=new RegExp(
  "(#[^\\n]*)"+
  "|('''[\\s\\S]*?'''|\"\"\"[\\s\\S]*?\"\"\")"+
  "|([rbfu]{0,2}'(?:\\\\.|[^'\\\\\\n])*'|[rbfu]{0,2}\"(?:\\\\.|[^\"\\\\\\n])*\")"+
  "|\\b("+KW+")\\b"+
  "|(@[A-Za-z_][\\w.]*)"+
  "|\\b(\\d[\\d_]*\\.?[\\d_]*(?:[eE][+-]?\\d+)?j?)\\b"+
  "|\\b("+BI+")\\b","g");
function highlight(src){
  let out="",last=0,m;
  TOKRE.lastIndex=0;
  while((m=TOKRE.exec(src))){
    out+=esc(src.slice(last,m.index));
    const cls=m[1]?"c":m[2]?"s":m[3]?"s":m[4]?"k":m[5]?"d":m[6]?"n":"b";
    out+='<span class="tok-'+cls+'">'+esc(m[0])+"</span>";
    last=m.index+m[0].length;
  }
  return out+esc(src.slice(last));
}

/* ================= Markdown-lite renderer =================
   Blocks: "## " h3 · "### " h4 · "- " ul · "1. " ol · "> " callout · "~~~" code fence
   ("~~~out" = program output block) · blank line = paragraph break.
   Inline: {{code}} and **bold**. All content is escaped first — nothing is ever
   injected raw, so page content cannot smuggle HTML/JS.                         */
function inline(t){
  t=esc(t);
  t=t.replace(/\{\{([^]*?)\}\}/g,(_,c)=>"<code>"+c+"</code>");
  t=t.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  return t;
}
function md(src){
  const lines=src.split("\n"); let html="",i=0;
  let para=[],list=null,callout=[];
  const flushP=()=>{ if(para.length){html+="<p>"+inline(para.join(" "))+"</p>";para=[];} };
  const flushL=()=>{ if(list){html+="<"+list.tag+">"+list.items.map(x=>"<li>"+inline(x)+"</li>").join("")+"</"+list.tag+">";list=null;} };
  const flushC=()=>{ if(callout.length){html+='<div class="callout"><p>'+inline(callout.join(" "))+"</p></div>";callout=[];} };
  const flushAll=()=>{flushP();flushL();flushC();};
  while(i<lines.length){
    const L=lines[i];
    if(L.startsWith("~~~")){
      flushAll();
      const info=L.slice(3).trim(); const buf=[]; i++;
      while(i<lines.length && !lines[i].startsWith("~~~")){buf.push(lines[i]);i++;}
      i++; const code=buf.join("\n");
      if(info==="out"){
        if(html.endsWith("</div>") && html.includes('class="codewrap')){
          const k=html.lastIndexOf("</div>");
          html=html.slice(0,k).replace(/class="codewrap/,'class="codewrap hasout')
              +'<pre class="out">'+esc(code)+"</pre></div>";
        } else html+='<pre class="out">'+esc(code)+"</pre>";
      } else {
        html+='<div class="codewrap"><button class="copybtn" type="button">copy</button><pre class="code"><code>'+highlight(code)+"</code></pre></div>";
      }
      continue;
    }
    if(L.startsWith("### ")){flushAll();html+="<h4>"+inline(L.slice(4))+"</h4>";}
    else if(L.startsWith("## ")){flushAll();html+="<h3>"+inline(L.slice(3))+"</h3>";}
    else if(L.startsWith("> ")){flushP();flushL();callout.push(L.slice(2));}
    else if(/^- /.test(L)){flushP();flushC();if(!list||list.tag!=="ul"){flushL();list={tag:"ul",items:[]};}list.items.push(L.slice(2));}
    else if(/^\d+\. /.test(L)){flushP();flushC();if(!list||list.tag!=="ol"){flushL();list={tag:"ol",items:[]};}list.items.push(L.replace(/^\d+\. /,""));}
    else if(L.trim()===""){flushAll();}
    else {flushL();flushC();para.push(L.trim());}
    i++;
  }
  flushAll(); return html;
}

/* ================= Helpers ================= */
function flatTopics(){ const a=[];CURRICULUM.forEach(tr=>tr.topics.forEach(t=>a.push({tr,t})));return a; }
function totalQ(){ return flatTopics().reduce((n,x)=>n+x.t.questions.length,0); }
function topicById(id){ for(const tr of CURRICULUM){const t=tr.topics.find(t=>t.id===id);if(t)return{tr,t};} return null; }
function topicSolvedCount(t){ return t.questions.reduce((n,_,j)=>n+(state.solved.has(t.id+":"+j)?1:0),0); }
const LEVELS={easy:"Easy",hard:"Hard",super:"Super Hard"};
const ROMAN=["I","II","III","IV","V","VI","VII","VIII"];

/* ================= Sidebar ================= */
function buildToc(){
  const nav=$("#toc"); nav.innerHTML="";
  CURRICULUM.forEach((tr,ti)=>{
    const d=document.createElement("div"); d.className="track"; d.dataset.track=tr.id;
    const solved=tr.topics.reduce((n,t)=>n+topicSolvedCount(t),0);
    const tot=tr.topics.reduce((n,t)=>n+t.questions.length,0);
    d.innerHTML='<button class="tk" type="button"><span class="roman">'+ROMAN[ti]+'</span>'+
      '<span class="tname">'+esc(tr.name)+'</span><span class="count">'+solved+"/"+tot+
      '</span><span class="chev">▾</span></button>';
    const ul=document.createElement("ul"); ul.className="topics";
    tr.topics.forEach(t=>{
      const li=document.createElement("li");
      const done=topicSolvedCount(t)===t.questions.length||state.doneTopics.has(t.id);
      li.innerHTML='<a href="#'+t.id+'" data-id="'+t.id+'" class="'+(done?"done":"")+'">'+
        '<span class="dot"></span><span>'+esc(t.title)+'</span><span class="min">'+t.minutes+"m</span></a>";
      ul.appendChild(li);
    });
    d.appendChild(ul);
    d.querySelector(".tk").addEventListener("click",()=>d.classList.toggle("closed"));
    nav.appendChild(d);
  });
  markActive(); updateProgressUI();
}
function markActive(){
  const id=location.hash.slice(1);
  document.querySelectorAll("#toc a").forEach(a=>{
    a.classList.toggle("active",a.dataset.id===id);
    if(a.dataset.id===id){const tk=a.closest(".track");if(tk)tk.classList.remove("closed");}
  });
}
function updateProgressUI(){
  const tot=totalQ(), n=state.solved.size;
  $("#pcount").textContent=n+" / "+tot;
  $("#pbar").style.width=(tot?100*n/tot:0)+"%";
  document.querySelectorAll("#toc .track").forEach((d,ti)=>{
    const tr=CURRICULUM[ti];
    const solved=tr.topics.reduce((s,t)=>s+topicSolvedCount(t),0);
    const tt=tr.topics.reduce((s,t)=>s+t.questions.length,0);
    d.querySelector(".count").textContent=solved+"/"+tt;
    tr.topics.forEach(t=>{
      const a=d.querySelector('a[data-id="'+t.id+'"]');
      if(a)a.classList.toggle("done",topicSolvedCount(t)===t.questions.length||state.doneTopics.has(t.id));
    });
  });
}

/* ================= Views ================= */
function renderHome(){
  $("#crumb").innerHTML="<b>PyMastery</b> · curriculum map";
  const topics=flatTopics().length, qs=totalQ();
  const mins=flatTopics().reduce((n,x)=>n+x.t.minutes,0);
  let h='<div class="hero fadein"><p class="eyebrow">A complete, non-linear Python curriculum</p>'+
  '<div class="big">Master Python by <em>solving</em>, not scrolling.</div>'+
  '<p class="lede">Seven tracks, '+topics+' topics, '+qs+' graded problems — every one with a hint and a fully worked solution. Start anywhere. Jump anywhere. The suggested order below is a map, not a fence.</p>'+
  '<div class="statline"><div><b>'+topics+'</b>topics</div><div><b>'+qs+'</b>problems</div><div><b>~'+Math.round(mins/60)+'h</b>of guided reading</div><div><b>3</b>difficulty rungs each</div></div></div>';

  h+='<div class="method"><h3>The method (read this once — it is the whole secret)</h3>'+
  '<p style="color:var(--muted);margin:0 0 4px">No website can honestly promise a success rate. What reliably works is how you use it:</p><ol>'+
  '<li><b>Type every example yourself.</b> Never copy-paste while learning. Your fingers are part of your memory.</li>'+
  '<li><b>Struggle before the hint.</b> Give each problem 15 focused minutes before opening the hint, and another 10 before the solution. The struggle is the learning; the solution is just confirmation.</li>'+
  '<li><b>Explain the solution back.</b> After reading a solution, close it and re-write the code from your own understanding. If you can’t, you haven’t learned it yet — and that’s useful information.</li>'+
  '<li><b>Revisit on a delay.</b> Re-solve yesterday’s Super Hard problem from scratch today. Spaced recall beats re-reading ten times over.</li>'+
  '<li><b>Build after every track.</b> Finish Fundamentals → build a tiny CLI tool. Finish Pandas → analyze a dataset you personally care about. Projects convert knowledge into skill.</li></ol>'+
  '<p style="color:var(--muted);margin:8px 0 0">Run code in any editor (VS Code + Python), the terminal, or an online REPL. This site is your map and problem book; the interpreter is your gym.</p></div>';

  CURRICULUM.forEach((tr,ti)=>{
    h+='<section class="trackcard fadein"><div class="thead"><span class="roman">TRACK '+ROMAN[ti]+'</span>'+
    '<h3>'+esc(tr.name)+'</h3><span class="tag">'+tr.topics.length+' topics · '+
    tr.topics.reduce((n,t)=>n+t.questions.length,0)+' problems</span></div>'+
    '<p class="blurb">'+inline(tr.blurb)+'</p><div class="chips">'+
    tr.topics.map(t=>{
      const done=topicSolvedCount(t)===t.questions.length||state.doneTopics.has(t.id);
      return '<a href="#'+t.id+'" class="'+(done?"done":"")+'">'+esc(t.title)+"</a>";
    }).join("")+"</div></section>";
  });
  $("#content").innerHTML=h;
}
function renderTopic(id){
  const hit=topicById(id); if(!hit){renderHome();return;}
  const {tr,t}=hit;
  const ti=CURRICULUM.indexOf(tr);
  $("#crumb").innerHTML="<b>"+esc(tr.name)+"</b> · "+esc(t.title);
  let h='<div class="fadein"><p class="eyebrow">Track '+ROMAN[ti]+" — "+esc(tr.name)+'</p>'+
    '<h2 class="title">'+esc(t.title)+'</h2>'+
    '<div class="meta"><span class="pill">≈ '+t.minutes+' min read</span>'+
    '<span class="pill">'+t.questions.length+' problems</span>'+
    '<span class="pill">jump anywhere — no prerequisites enforced</span></div>'+
    '<article class="body">'+md(t.body)+"</article>";

  h+='<div class="ladderhead"><h3>The ladder</h3><span>climb: easy → hard → super hard</span></div><section class="ladder">';
  t.questions.forEach((q,j)=>{
    const qid=t.id+":"+j, on=state.solved.has(qid);
    h+='<article class="rung '+q.level+(on?" solved":"")+'" data-q="'+qid+'">'+
      '<div class="rhead"><span class="badge">'+LEVELS[q.level]+'</span><h4>'+esc(q.title)+'</h4>'+
      '<button class="solvebtn" type="button">'+(on?"✓ Solved":"Mark solved")+'</button></div>'+
      '<div class="body">'+md(q.prompt)+"</div>"+
      '<details class="hint"><summary>Hint — open after 15 real minutes</summary><div class="inner">'+md(q.hint)+"</div></details>"+
      '<details class="sol"><summary>Solution &amp; why it works</summary><div class="inner">'+md(q.solution)+"</div></details></article>";
  });
  h+="</section>";

  const doneOn=state.doneTopics.has(t.id);
  h+='<div class="topicdone"><button id="donebtn" class="'+(doneOn?"on":"")+'" type="button">'+
     (doneOn?"✓ Topic complete":"Mark topic complete")+"</button></div>";

  const flat=flatTopics(); const idx=flat.findIndex(x=>x.t.id===id);
  const prev=flat[idx-1], next=flat[idx+1];
  h+='<nav class="pager">'+
    (prev?'<a href="#'+prev.t.id+'"><span>← previous</span>'+esc(prev.t.title)+"</a>":'<a href="#"><span>↖ start</span>Curriculum map</a>')+
    (next?'<a class="next" href="#'+next.t.id+'"><span>next →</span>'+esc(next.t.title)+"</a>":'<a class="next" href="#"><span>finish</span>Back to the map</a>')+"</nav></div>";

  $("#content").innerHTML=h;
  $("#content").querySelectorAll(".rung .solvebtn").forEach(b=>{
    b.addEventListener("click",e=>{
      const r=e.target.closest(".rung"), qid=r.dataset.q;
      if(state.solved.has(qid)){state.solved.delete(qid);r.classList.remove("solved");b.textContent="Mark solved";}
      else{state.solved.add(qid);r.classList.add("solved");b.textContent="✓ Solved";}
      updateProgressUI();
    });
  });
  const db=$("#donebtn");
  db.addEventListener("click",()=>{
    if(state.doneTopics.has(t.id)){state.doneTopics.delete(t.id);db.classList.remove("on");db.textContent="Mark topic complete";}
    else{state.doneTopics.add(t.id);db.classList.add("on");db.textContent="✓ Topic complete";}
    updateProgressUI();
  });
  window.scrollTo({top:0,behavior:"instant"});
}
function route(){
  const id=location.hash.slice(1);
  if(!id||id==="home")renderHome(); else renderTopic(id);
  markActive();
  $("#sidebar").classList.remove("open"); $("#backdrop").classList.remove("show");
}

/* ================= Search / shortcuts / chrome ================= */
function wireChrome(){
  $("#search").addEventListener("input",e=>{
    const q=e.target.value.trim().toLowerCase();
    document.querySelectorAll("#toc .track").forEach((d,ti)=>{
      const tr=CURRICULUM[ti]; let any=false;
      tr.topics.forEach(t=>{
        const li=d.querySelector('a[data-id="'+t.id+'"]').parentElement;
        const hitq=!q||(t.title+" "+(t.keywords||"")).toLowerCase().includes(q);
        li.classList.toggle("hide",!hitq); if(hitq)any=true;
      });
      d.classList.toggle("hide",!any);
      if(q)d.classList.remove("closed");
    });
  });
  $("#search").addEventListener("keydown",e=>{
    if(e.key==="Enter"){const a=document.querySelector("#toc li:not(.hide) a");if(a)location.hash=a.getAttribute("href");}
    if(e.key==="Escape"){e.target.value="";e.target.dispatchEvent(new Event("input"));e.target.blur();}
  });
  document.addEventListener("keydown",e=>{
    if(e.key==="/"&&document.activeElement!==$("#search")&&!/INPUT|TEXTAREA/.test(document.activeElement.tagName)){
      e.preventDefault();$("#search").focus();
    }
  });
  document.addEventListener("click",e=>{
    const b=e.target.closest(".copybtn"); if(!b)return;
    const code=b.parentElement.querySelector("pre.code").innerText;
    navigator.clipboard.writeText(code).then(()=>{b.textContent="copied ✓";setTimeout(()=>b.textContent="copy",1200);})
      .catch(()=>{b.textContent="select & copy";setTimeout(()=>b.textContent="copy",1500);});
  });
  $("#menubtn").addEventListener("click",()=>{$("#sidebar").classList.add("open");$("#backdrop").classList.add("show");});
  $("#backdrop").addEventListener("click",()=>{$("#sidebar").classList.remove("open");$("#backdrop").classList.remove("show");});
  $("#themebtn").addEventListener("click",()=>{
    const r=document.documentElement;
    r.dataset.theme=r.dataset.theme==="dark"?"light":"dark";
  });
  $("#exportbtn").addEventListener("click",()=>{
    const blob=new Blob([JSON.stringify({solved:[...state.solved],doneTopics:[...state.doneTopics]},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download="pymastery-progress.json";a.click();URL.revokeObjectURL(a.href);
  });
  $("#importfile").addEventListener("change",e=>{
    const f=e.target.files[0]; if(!f)return;
    f.text().then(txt=>{
      try{const d=JSON.parse(txt);
        state.solved=new Set(Array.isArray(d.solved)?d.solved:[]);
        state.doneTopics=new Set(Array.isArray(d.doneTopics)?d.doneTopics:[]);
        buildToc();route();
      }catch(_){alert("That file doesn’t look like a PyMastery progress file.");}
      e.target.value="";
    });
  });
  $("#resetbtn").addEventListener("click",()=>{
    if(confirm("Clear all solved marks? (Tip: Save progress first.)")){
      state.solved.clear();state.doneTopics.clear();buildToc();route();
    }
  });
  window.addEventListener("hashchange",route);
}
function boot(){ buildToc(); wireChrome(); route(); }
</script>
<script>
addTrack({id:"fun",name:"Python Fundamentals",blurb:"The core language: how Python thinks, the data types you will touch every single day, and the control flow that turns ideas into programs. Everything else in this curriculum stands on these eight topics.",topics:[

{id:"start",title:"Getting Started & How Python Runs",minutes:18,keywords:"install interpreter repl script pip run hello world",
body:[
"Python is an **interpreted** language: a program called the interpreter reads your code top-to-bottom and executes it line by line. There is no separate compile step you manage — you write a {{.py}} file, run it, and see results instantly. That tight loop is why Python is the fastest language to *think* in.",
"",
"## Two ways to run Python",
"**The REPL** (Read–Evaluate–Print Loop) is an interactive prompt. Type {{python}} (or {{python3}}) in a terminal and you get {{>>>}} — every line you type runs immediately. It is your scratchpad: test one idea, see the answer, move on.",
"",
"~~~",
">>> 2 + 3 * 4",
"14",
">>> \"py\" * 3",
"'pypypy'",
"~~~",
"",
"**Script files** are how real programs live. Save code in {{hello.py}}, run {{python hello.py}}, and the interpreter executes the whole file.",
"",
"~~~",
"# hello.py — your first program",
"name = input(\"Who are you? \")",
"print(f\"Hello, {name}. Welcome to Python.\")",
"~~~",
"",
"## The mental model that matters",
"Python executes **top to bottom**, one statement at a time. Names must be defined *before* the line that uses them runs. Indentation is not decoration — it is syntax. A block (the body of an {{if}}, a loop, a function) is defined purely by consistent indentation, conventionally **4 spaces**.",
"",
"~~~",
"score = 87",
"if score >= 60:",
"    print(\"pass\")      # inside the if-block",
"print(\"done\")          # outside — always runs",
"~~~",
"~~~out",
"pass",
"done",
"~~~",
"",
"## Errors are information, not failure",
"When Python hits a problem it prints a **traceback**. Read it bottom-up: the last line names the error type and message; the lines above show exactly where it happened. {{SyntaxError}} means Python couldn't even parse the code; {{NameError}} means you used a name that doesn't exist yet; {{TypeError}} means the operation doesn't make sense for those types. Learning to read tracebacks calmly is the single highest-leverage beginner skill.",
"",
"## Installing packages",
"Python ships with a huge standard library, and everything else comes from PyPI via {{pip}}:",
"~~~",
"python -m pip install requests",
"~~~",
"> **Pitfall:** naming your own file after a module you import ({{random.py}}, {{string.py}}) shadows the real one and produces baffling errors. Name files after what they do.",
].join("\n"),
questions:[
{level:"easy",title:"Trace the traceback",
prompt:["This script crashes. **Without running it**, say which line fails, what error type Python raises, and rewrite it fixed.","","~~~","print(\"Starting up\")","total = price * 3","price = 10","print(total)","~~~"].join("\n"),
hint:"Python runs top to bottom. On line 2, does the name {{price}} exist yet? What does Python call the error for a name that hasn't been defined?",
solution:["Line 2 fails with a **NameError**: {{price}} is used before the line that creates it has run. Execution order is everything — Python doesn't scan ahead.","","~~~","print(\"Starting up\")","price = 10","total = price * 3","print(total)   # 30","~~~","","The fix is pure re-ordering. Whenever you see {{NameError: name 'x' is not defined}}, ask: has the line that assigns {{x}} executed *before* this point?"].join("\n")},
{level:"hard",title:"Predict the indentation",
prompt:["Predict the exact output, then explain the role each indentation level plays.","","~~~","n = 3","for i in range(n):","    print(\"tick\", i)","    if i == 1:","        print(\"  midpoint\")","print(\"loop finished\")","~~~"].join("\n"),
hint:"Two indent levels exist here: the loop body (runs every iteration) and the if body (runs only when its condition is true). The last print is at level zero — how many times does *that* run?",
solution:["~~~out","tick 0","tick 1","  midpoint","tick 2","loop finished","~~~","","Both {{print(\"tick\", i)}} and the {{if}} are inside the loop, so they're evaluated 3 times; the nested print fires only when {{i == 1}}. {{print(\"loop finished\")}} is dedented to the top level, so it runs exactly once, after the loop. In Python, *where a line sits horizontally is where it belongs logically.*"].join("\n")},
{level:"super",title:"Build a REPL calculator script",
prompt:["Write {{calc.py}}: it repeatedly asks the user for input like {{12 * 7}} or {{100 / 8}} (one operator: + - * /), prints the result, and exits cleanly when the user types {{q}}. Requirements:","- Do **not** use {{eval}} (it executes arbitrary code — a real security hole).","- Dividing by zero must print a friendly message, not crash.","- Malformed input (e.g. {{12 ** 3}} or {{banana}}) must print a usage message and continue."].join("\n"),
hint:"Loop with {{while True:}}. Use {{line.split()}} and check you got exactly 3 parts. Convert with {{float()}} inside a {{try/except ValueError}}. A dictionary is overkill here — a simple if/elif chain per operator is fine. {{break}} exits the loop on {{q}}.",
solution:["~~~","# calc.py","while True:","    line = input(\"calc> \").strip()","    if line.lower() == \"q\":","        print(\"bye\")","        break","    parts = line.split()","    if len(parts) != 3:","        print(\"usage: <number> <+|-|*|/> <number>   (or q to quit)\")","        continue","    a_str, op, b_str = parts","    try:","        a, b = float(a_str), float(b_str)","    except ValueError:","        print(\"those don't look like numbers\")","        continue","    if op == \"+\":   print(a + b)","    elif op == \"-\": print(a - b)","    elif op == \"*\": print(a * b)","    elif op == \"/\":","        if b == 0:","            print(\"can't divide by zero\")","        else:","            print(a / b)","    else:","        print(f\"unknown operator {op!r}\")","~~~","","Why no {{eval}}? {{eval(input())}} would happily run {{__import__('os').system('rm -rf ~')}}. Parsing input yourself — split, validate, convert — is the professional habit: **never trust input, always validate shape before value.** Notice how {{continue}} keeps the loop alive after every recoverable error, so one bad entry never kills the session."].join("\n")}
]},

{id:"types",title:"Variables, Data Types & Operators",minutes:26,keywords:"int float bool string dynamic typing operators comparison assignment none",
body:[
"A variable in Python is a **name tag tied to an object**, not a box containing a value. {{x = 5}} creates an integer object {{5}} and points the name {{x}} at it. Reassigning just moves the tag. This one idea explains half of Python's 'surprising' behavior later (especially with lists).",
"",
"## The core types",
"- {{int}} — whole numbers, unlimited size: {{7}}, {{-3}}, {{10**100}} works fine.",
"- {{float}} — decimals: {{3.14}}, {{2.0}}. Stored in binary, so {{0.1 + 0.2 == 0.30000000000000004}}. Not a bug — a property of all binary floating point, in every language.",
"- {{bool}} — {{True}} / {{False}}. Secretly a subtype of int ({{True + True == 2}}), which is occasionally useful and occasionally a trap.",
"- {{str}} — text, covered in depth next topic.",
"- {{NoneType}} — the single value {{None}}: 'nothing here'. Functions that don't return anything return {{None}}.",
"",
"~~~",
"x = 42",
"print(type(x))          # <class 'int'>",
"x = \"now a string\"      # same name, new object — perfectly legal",
"print(type(x))          # <class 'str'>",
"~~~",
"",
"Python is **dynamically typed**: names have no fixed type, but every *object* has exactly one. {{type()}} tells you what you're holding; {{isinstance(x, int)}} is the polite way to check.",
"",
"## Operators worth internalizing",
"~~~",
"print(7 / 2)    # 3.5   true division — always float",
"print(7 // 2)   # 3     floor division — rounds down",
"print(-7 // 2)  # -4    floor, not truncation!",
"print(7 % 2)    # 1     remainder (modulo)",
"print(2 ** 10)  # 1024  power",
"~~~",
"",
"{{%}} is everywhere: {{n % 2 == 0}} tests even, {{i % 5 == 0}} means 'every 5th', wrapping an index is {{i % len(items)}}.",
"",
"### Comparison and logic",
"Comparisons ({{==}}, {{!=}}, {{<}}, {{>=}} …) produce booleans and can **chain**: {{0 <= x < 10}} reads like math and works like it too. Logic uses the words {{and}}, {{or}}, {{not}}. Both {{and}}/{{or}} **short-circuit**: they stop evaluating as soon as the answer is known, and they return the deciding *operand*, not just True/False — {{name or \"anonymous\"}} is a common default-value idiom.",
"",
"### Truthiness",
"Every object is truthy or falsy. Falsy: {{0}}, {{0.0}}, {{\"\"}}, {{[]}}, {{{}}}, {{set()}}, {{None}}, {{False}}. Everything else is truthy. So {{if items:}} means 'if the list is non-empty'.",
"",
"> **Pitfall:** {{=}} assigns, {{==}} compares. And use {{x is None}} rather than {{x == None}} — {{is}} checks identity (same object), which is exactly the question you're asking about {{None}}.",
"",
"## Converting between types",
"~~~",
"age = int(\"19\")        # str -> int (raises ValueError if not numeric)",
"pi_ish = float(\"3.14\")",
"label = str(2026)      # anything -> its text form",
"print(int(9.99))       # 9  — truncates toward zero, no rounding",
"print(round(9.5), round(10.5))  # 10 10 — banker's rounding, to the even side",
"~~~"
].join("\n"),
questions:[
{level:"easy",title:"Type detective",
prompt:["Predict the type **and** value of each expression, then verify in the REPL.","","~~~","a = 15 / 3","b = 15 // 4","c = \"15\" + \"4\"","d = bool(\"False\")","e = 10 % 3 == 1","~~~"].join("\n"),
hint:"{{/}} always returns float, even when it divides evenly. Adding strings concatenates. For {{d}}: is a non-empty string truthy regardless of what it says?",
solution:["- {{a}} → {{5.0}}, a **float**. True division never returns int.","- {{b}} → {{3}}, an **int**. Floor of 3.75.","- {{c}} → {{\"154\"}}, a **str**. {{+}} on strings is concatenation, no math happens.","- {{d}} → {{True}}, a **bool**. {{\"False\"}} is a non-empty string, and *all* non-empty strings are truthy — the characters inside are irrelevant.","- {{e}} → {{True}}, a **bool**. {{10 % 3}} is 1, and {{1 == 1}}.","","The {{d}} case bites real programs: {{bool(input(\"yes/no? \"))}} is True for literally any answer, including 'no'."].join("\n")},
{level:"hard",title:"The change machine",
prompt:"Write {{make_change(cents)}} that returns how many quarters (25), dimes (10), nickels (5) and pennies (1) make up an amount, using the fewest coins. {{make_change(287)}} → {{(11, 1, 0, 2)}}. Use only {{//}} and {{%}} — no loops.",
hint:"Greedy works with these denominations: take as many quarters as fit ({{cents // 25}}), then ask what's left ({{cents % 25}}) and repeat with dimes. Each step is one floor-division and one modulo.",
solution:["~~~","def make_change(cents):","    q, rest = cents // 25, cents % 25","    d, rest = rest // 10, rest % 10","    n, p    = rest // 5,  rest % 5","    return (q, d, n, p)","","print(make_change(287))   # (11, 1, 0, 2)","print(make_change(99))    # (3, 2, 0, 4)","~~~","","The pattern {{big // unit}} ('how many fit') paired with {{big % unit}} ('what remains') is the fundamental decomposition idiom — the same trick converts seconds to h:m:s, flattens 2-D grid coordinates to an index, and back. Python even bundles the pair: {{q, rest = divmod(cents, 25)}}."].join("\n")},
{level:"super",title:"Short-circuit forensics",
prompt:["This function is called on a dict that may be missing keys or hold {{None}}. Explain precisely why line A is safe but line B can crash, then rewrite B correctly **and** explain what {{or}} returns in line C when {{cfg.get(\"retries\")}} is {{0}} — and why that's a bug.","","~~~","def read(cfg):","    if \"host\" in cfg and cfg[\"host\"].startswith(\"db\"):   # A","        print(\"db host\")","    if cfg[\"port\"] > 0 and \"port\" in cfg:                # B","        print(\"has port\")","    retries = cfg.get(\"retries\") or 3                    # C","    return retries","~~~"].join("\n"),
hint:"{{and}} evaluates left to right and stops at the first falsy value. In B the dangerous expression runs *first*. For C: what falsy values besides {{None}} can {{cfg.get(\"retries\")}} return, and what does {{falsy or 3}} evaluate to?",
solution:["**Line A is safe** because {{and}} short-circuits: if {{\"host\" in cfg}} is False, Python never evaluates {{cfg[\"host\"]}}, so no {{KeyError}} is possible. The guard runs first — that ordering is the entire safety mechanism.","","**Line B has the guard on the wrong side.** {{cfg[\"port\"]}} executes *before* the membership check, so a missing key raises {{KeyError}} immediately. Fixed:","","~~~","if \"port\" in cfg and cfg[\"port\"] > 0:","~~~","","**Line C:** {{or}} returns its first *truthy* operand. If {{retries}} is legitimately {{0}} (a real, meaningful setting: 'never retry'), then {{0 or 3}} evaluates to {{3}} — silently overriding the user's explicit choice, because {{0}} is falsy. The correct test distinguishes 'absent' from 'falsy':","","~~~","retries = cfg.get(\"retries\")","if retries is None:","    retries = 3","~~~","","Rule of thumb: {{x or default}} is fine for strings and containers where empty means absent; it is wrong for numbers and booleans where {{0}}/{{False}} are valid data."].join("\n")}
]},

{id:"strings",title:"Strings & Text Processing",minutes:28,keywords:"f-string slicing methods split join strip replace immutable format",
body:[
"Strings are **immutable sequences of characters**. Immutable means no method ever changes a string in place — every operation returns a *new* string. {{s.upper()}} doesn't shout at {{s}}; it hands you a shouting copy.",
"",
"~~~",
"s = \"python\"",
"s.upper()",
"print(s)            # python  — unchanged!",
"s = s.upper()       # rebind the name to keep the result",
"print(s)            # PYTHON",
"~~~",
"",
"## Indexing and slicing",
"Positions start at 0; negatives count from the end ({{-1}} is the last character). Slices take {{s[start:stop:step]}} — start included, **stop excluded**.",
"",
"~~~",
"s = \"hello world\"",
"print(s[0], s[-1])      # h d",
"print(s[0:5])           # hello",
"print(s[6:])            # world      (omit = to the end)",
"print(s[:5])            # hello      (omit = from the start)",
"print(s[::2])           # hlowrd     (every 2nd char)",
"print(s[::-1])          # dlrow olleh  (the reverse idiom)",
"~~~",
"",
"Half-open slices compose beautifully: {{s[:k] + s[k:] == s}} for any k, and the slice length is simply {{stop - start}}.",
"",
"## f-strings: how modern Python builds text",
"Prefix a string with {{f}} and anything in braces is evaluated and formatted in place. Format specs after a colon control the rendering:",
"",
"~~~",
"name, gpa, n = \"Joeal\", 3.8215, 1_234_567",
"print(f\"{name}: GPA {gpa:.2f}\")        # Joeal: GPA 3.82",
"print(f\"{n:,}\")                        # 1,234,567",
"print(f\"{0.634:.1%}\")                  # 63.4%",
"print(f\"[{name:>10}] [{name:<10}]\")    # [     Joeal] [Joeal     ]",
"print(f\"{gpa=}\")                       # gpa=3.8215  (debug form)",
"~~~",
"",
"## The workhorse methods",
"- {{split(sep)}} — string → list. With no argument, splits on any run of whitespace (perfect for messy input).",
"- {{\", \".join(items)}} — list → string. Note the direction: you call join **on the glue**.",
"- {{strip()}} / {{lstrip()}} / {{rstrip()}} — shave whitespace (or given characters) off the ends.",
"- {{replace(old, new)}}, {{lower()}}, {{upper()}}, {{title()}}, {{startswith(x)}}, {{endswith(x)}}, {{find(x)}} (−1 if absent) vs {{index(x)}} (raises), {{count(x)}}.",
"- Validators: {{isdigit()}}, {{isalpha()}}, {{isalnum()}}, {{isspace()}}.",
"",
"~~~",
"raw = \"  alice,BOB , Carol  \"",
"names = [p.strip().title() for p in raw.split(\",\")]",
"print(names)                 # ['Alice', 'Bob', 'Carol']",
"print(\" | \".join(names))     # Alice | Bob | Carol",
"~~~",
"",
"> **Pitfall:** because strings are immutable, building one with {{+=}} inside a big loop copies the whole thing every pass — O(n²). Collect pieces in a list and {{\"\".join(parts)}} once at the end.",
"",
"Membership testing reads like English: {{\"@\" in email}}, {{\"error\" not in line.lower()}}."
].join("\n"),
questions:[
{level:"easy",title:"Slice surgeon",
prompt:["Given {{s = \"programming\"}}, produce each of these using **one slice each** — no methods, no loops:","- {{\"gram\"}}","- {{\"pormig\"}} (every other letter)","- {{\"gnimmargorp\"}} (reversed)","- the middle character"].join("\n"),
hint:"Count positions: p-r-o-g-r-a-m-m-i-n-g is indices 0..10. 'gram' starts at 3. For the middle of an odd-length string, {{len(s) // 2}} is the index.",
solution:["~~~","s = \"programming\"     # len 11","print(s[3:7])          # gram   (stop is exclusive)","print(s[::2])          # pormig","print(s[::-1])         # gnimmargorp","print(s[len(s)//2])    # m   (index 5)","~~~","","The habit to build: when a slice looks wrong, check the *stop* first — nine times out of ten you forgot it's exclusive."].join("\n")},
{level:"hard",title:"Log line parser",
prompt:["Server logs look like {{\"2026-06-14 22:03:11 | ERROR | payment failed for user 8841\"}}. Write {{parse(line)}} returning a dict {{{\"date\": ..., \"time\": ..., \"level\": ..., \"message\": ...}}} — robust to extra spaces around the pipes and to pipes **inside the message** ({{\"... | retrying\"}} must stay in the message)."].join("\n"),
hint:"{{split(\"|\")}} would shred the message. {{split(\"|\", 2)}} caps the number of splits at 2, giving exactly 3 parts no matter how many pipes follow. The first part then splits on whitespace into date and time.",
solution:["~~~","def parse(line):","    stamp, level, message = line.split(\"|\", 2)","    date, time = stamp.split()","    return {","        \"date\": date,","        \"time\": time,","        \"level\": level.strip(),","        \"message\": message.strip(),","    }","","print(parse(\"2026-06-14 22:03:11 | ERROR | payment failed | retrying\"))","~~~","~~~out","{'date': '2026-06-14', 'time': '22:03:11', 'level': 'ERROR', 'message': 'payment failed | retrying'}","~~~","","The {{maxsplit}} argument is the professional's tool for 'split the envelope, not the letter'. Note also {{stamp.split()}} with no argument, which shrugs off any amount of surrounding whitespace — sturdier than {{split(\" \")}}."].join("\n")},
{level:"super",title:"Caesar cipher, both directions",
prompt:["Implement {{encrypt(text, shift)}} and {{decrypt(text, shift)}} for a Caesar cipher: each letter shifts forward by {{shift}} positions in the alphabet, wrapping Z→A. Uppercase stays uppercase, lowercase stays lowercase, and everything else (spaces, digits, punctuation) passes through untouched. {{encrypt(\"Attack at dawn!\", 5)}} → {{\"Fyyfhp fy ifbs!\"}}. Then explain why decrypt needs no new logic."].join("\n"),
hint:"Work with codepoints: {{ord(ch)}} → number, {{chr(n)}} → character. For a lowercase letter, its alphabet position is {{ord(ch) - ord(\"a\")}}; shift it, wrap with {{% 26}}, convert back. Build the result as a list and join. Decrypting a shift of 5 is encrypting with… what?",
solution:["~~~","def encrypt(text, shift):","    out = []","    for ch in text:","        if \"a\" <= ch <= \"z\":","            base = ord(\"a\")","        elif \"A\" <= ch <= \"Z\":","            base = ord(\"A\")","        else:","            out.append(ch)          # not a letter: pass through","            continue","        pos = (ord(ch) - base + shift) % 26","        out.append(chr(base + pos))","    return \"\".join(out)","","def decrypt(text, shift):","    return encrypt(text, -shift)    # shifting back IS encrypting negatively","","msg = encrypt(\"Attack at dawn!\", 5)","print(msg)                  # Fyyfhp fy ifbs!","print(decrypt(msg, 5))      # Attack at dawn!","~~~","","Three ideas do all the work. **(1)** {{ord}}/{{chr}} turn character arithmetic into integer arithmetic. **(2)** {{% 26}} handles wraparound in both directions — Python's modulo of a negative number is still non-negative, so {{(-3) % 26 == 23}}, which is exactly why {{decrypt}} can just negate the shift. **(3)** Appending to a list and joining once respects string immutability instead of fighting it."].join("\n")}
]},

{id:"flow",title:"Conditionals & Logic",minutes:20,keywords:"if elif else nested ternary conditional expression match guard",
body:[
"Conditionals are how a program makes decisions. Python evaluates the {{if}} condition; if truthy, that block runs and the whole chain ends. Otherwise each {{elif}} is tried in order, and {{else}} catches everything left.",
"",
"~~~",
"score = 74",
"if score >= 90:",
"    grade = \"A\"",
"elif score >= 80:",
"    grade = \"B\"",
"elif score >= 70:",
"    grade = \"C\"",
"else:",
"    grade = \"F\"",
"print(grade)     # C",
"~~~",
"",
"**Order is logic.** The chain above works because it checks from the top down — a 95 hits the first branch and never reaches the rest. Reverse the order ({{>= 70}} first) and every passing score becomes a C. When branches overlap, put the most specific test first.",
"",
"## One branch runs. Exactly one.",
"An {{if/elif/elif/else}} chain selects a *single* branch. Separate {{if}} statements are all tested independently. Both are useful; confusing them is a classic bug:",
"",
"~~~",
"n = 12",
"if n % 2 == 0: print(\"even\")      # these two are independent —",
"if n % 3 == 0: print(\"div by 3\")  # both can fire",
"~~~",
"~~~out",
"even",
"div by 3",
"~~~",
"",
"## The conditional expression (ternary)",
"For choosing a *value* rather than an action:",
"~~~",
"label = \"even\" if n % 2 == 0 else \"odd\"",
"~~~",
"Use it when it fits on one readable line. Nesting ternaries is legal and unreadable — reach for a real if-chain instead.",
"",
"## Guard clauses flatten code",
"Deep nesting usually means the error cases are wrapping the happy path. Invert them and return early:",
"",
"~~~",
"def ship(order):",
"    if not order.paid:",
"        return \"unpaid\"",
"    if not order.in_stock:",
"        return \"backordered\"",
"    return \"shipped\"        # the happy path, at zero indent depth",
"~~~",
"",
"## structural pattern matching (3.10+)",
"{{match/case}} is a supercharged switch — it can destructure shapes, not just compare values:",
"~~~",
"match command.split():",
"    case [\"go\", direction]:",
"        print(f\"walking {direction}\")",
"    case [\"look\"]:",
"        print(\"you see a curriculum\")",
"    case _:",
"        print(\"unknown command\")",
"~~~",
"",
"> **Pitfall:** {{if x == 1 or 2:}} does not mean 'x is 1 or 2'. It parses as {{(x == 1) or (2)}}, and {{2}} is always truthy — the condition is *always* True. Write {{if x == 1 or x == 2:}} or best, {{if x in (1, 2):}}."
].join("\n"),
questions:[
{level:"easy",title:"FizzBuzz, the right way",
prompt:"Print 1–30, but multiples of 3 print {{Fizz}}, multiples of 5 print {{Buzz}}, and multiples of both print {{FizzBuzz}}. The interview classic — and the ordering of your conditions is the entire point.",
hint:"If you test {{% 3}} first, 15 matches it and you print Fizz before ever considering FizzBuzz. Which condition is the most specific?",
solution:["~~~","for i in range(1, 31):","    if i % 15 == 0:        # most specific first: divisible by both","        print(\"FizzBuzz\")","    elif i % 3 == 0:","        print(\"Fizz\")","    elif i % 5 == 0:","        print(\"Buzz\")","    else:","        print(i)","~~~","","{{i % 15 == 0}} is equivalent to divisible-by-3-and-5 (since 3 and 5 share no factors). The lesson generalizes: **in an elif chain, specificity must decrease as you go down**, because the first match wins and the rest are never consulted."].join("\n")},
{level:"hard",title:"Ticket pricing engine",
prompt:["A cinema prices tickets: base 12.00. Under 5: free. Ages 5–12: half price. 65+: 30% off. **Tuesday**: everyone pays 8.00 flat, overriding all age rules except under-5 (still free). Students (any age 13–64) get 2.00 off the price they'd otherwise pay — but the price never drops below 5.00 except for the free cases. Write {{price(age, is_student, day)}} and make these pass:","","~~~","assert price(3,  False, \"monday\")  == 0","assert price(8,  False, \"friday\")  == 6.0","assert price(70, False, \"sunday\")  == 8.4","assert price(20, True,  \"monday\")  == 10.0","assert price(20, True,  \"tuesday\") == 6.0","assert price(13, True,  \"friday\")  == 10.0","~~~"].join("\n"),
hint:"Layer the rules in precedence order: free case first (return early), then the Tuesday override sets the base, then age tiers, then the student discount, then the floor via {{max(result, 5.00)}}. Guard clauses keep this flat.",
solution:["~~~","def price(age, is_student, day):","    if age < 5:","        return 0                       # rule with highest precedence","    if day == \"tuesday\":","        p = 8.00                       # flat override...","    elif age <= 12:","        p = 12.00 * 0.5","    elif age >= 65:","        p = 12.00 * 0.7","    else:","        p = 12.00","    if is_student and 13 <= age <= 64:","        p -= 2.00","    return max(p, 5.00)                # floor applies to all paid tickets","~~~","","The craft here is **translating prose rules into precedence**: the early return encodes 'overriding all rules', the elif chain encodes mutually exclusive tiers, the separate {{if}} encodes a discount that *stacks*, and {{max}} encodes a floor in one word. When business logic gets gnarly, the structure of your conditionals should mirror the structure of the policy."].join("\n")},
{level:"super",title:"Leap year, from the spec",
prompt:"The Gregorian rule: a year is a leap year if divisible by 4, **except** century years (divisible by 100), **unless** also divisible by 400. Write {{is_leap(year)}} as a single boolean expression (no if statements), then prove it on 1996, 1900, 2000, 2023. Finally, explain the operator-precedence trap that makes the naive one-liner wrong without parentheses.",
hint:"Translate: (div by 4 AND not div by 100) OR (div by 400). In Python, {{and}} binds tighter than {{or}} — decide whether that helps or hurts your particular arrangement, then add parentheses so the next reader doesn't have to know.",
solution:["~~~","def is_leap(year):","    return (year % 4 == 0 and year % 100 != 0) or year % 400 == 0","","for y in (1996, 1900, 2000, 2023):","    print(y, is_leap(y))","~~~","~~~out","1996 True","1900 False","2000 True","2023 False","~~~","","The expression is the spec, read aloud: divisible by 4 and not a plain century, **or** a 400-century. The precedence trap: had you written {{year % 4 == 0 and (year % 100 != 0 or year % 400 == 0)}} — a different but *also correct* factoring — fine; but {{year % 4 == 0 and year % 100 != 0 or year % 400 == 0}} without parens only works *by luck* because {{and}} already binds tighter. Rely on parentheses, not luck: boolean bugs are the quietest bugs, because wrong logic still runs happily."].join("\n")}
]}
]});
</script>
